<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>지구 과학 탐험: 30초 서바이벌 EX+ Pro</title>
    <style>
        :root {
            --primary: #4caf50;
            --danger: #f44336;
            --accent: #ffeb3b;
            --sky: #2980b9;
        }
        body {
            margin: 0; padding: 0;
            background-color: #000;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            overflow: hidden;
            color: white;
            touch-action: none;
            user-select: none;
        }
        #game-wrapper {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        canvas {
            background: radial-gradient(circle, #1a2a3a 0%, #000000 100%);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            max-width: 100%; max-height: 100%;
        }
        /* UI 레이어 */
        #ui-layer {
            position: absolute; top: 20px; left: 50%;
            transform: translateX(-50%);
            width: 90%; pointer-events: none;
            display: flex; flex-direction: column; align-items: center;
            gap: 10px; z-index: 10;
        }
        .top-row { width: 100%; display: flex; justify-content: space-between; align-items: center; }
        #timer-display {
            font-size: 32px; color: var(--accent);
            text-shadow: 0 0 10px rgba(255, 235, 59, 0.5);
            font-weight: 900;
        }
        .hp-bar-outer {
            width: 150px; height: 12px;
            background: #333; border: 2px solid #fff;
            border-radius: 6px; overflow: hidden;
        }
        #hp-bar-inner {
            width: 100%; height: 100%;
            background: linear-gradient(90deg, #ff4d4d, #ff0000);
            transition: width 0.2s;
        }
        .exp-row { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        #exp-bar-inner { width: 0%; height: 100%; background: var(--sky); transition: width 0.3s; }

        /* 보스 체력 UI */
        #boss-ui {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; display: none; flex-direction: column; align-items: center;
        }
        #boss-hp-outer { width: 100%; height: 24px; background: #222; border: 2px solid #ff4757; border-radius: 12px; overflow: hidden; box-shadow: 0 0 15px rgba(255, 71, 87, 0.5); }
        #boss-hp-inner { width: 100%; height: 100%; background: linear-gradient(90deg, #ff4757, #ff6b81); transition: width 0.1s; }

        /* 모달 스타일 */
        #modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 420px;
            background: rgba(10, 10, 10, 0.98);
            padding: 30px; border: 4px solid var(--primary); border-radius: 25px;
            display: none; z-index: 100; text-align: center;
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }
        .option-btn {
            display: block; width: 100%; padding: 18px; margin: 12px 0;
            background: #252525; color: white; border: 2px solid #444;
            border-radius: 12px; cursor: pointer; font-size: 17px; font-weight: bold;
            transition: all 0.2s;
        }
        .option-btn:hover { border-color: var(--primary); background: #333; }
        .option-btn:active { transform: scale(0.95); background: var(--primary); }

        /* 화면 오버레이 */
        #start-screen, #clear-screen, #fail-screen {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200;
        }
        #fail-screen { display: none; }
        .play-btn {
            padding: 22px 60px; font-size: 26px; background: var(--primary);
            border: none; border-radius: 50px; color: white; cursor: pointer;
            font-weight: 900; box-shadow: 0 10px 20px rgba(76, 175, 80, 0.3);
            transition: transform 0.2s; margin-top: 10px;
        }
        .play-btn.retry-btn { background: #e67e22; }
        .play-btn:hover { transform: scale(1.05); }

        /* 조이스틱 */
        #joystick-container {
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            width: 140px; height: 140px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%; display: none;
        }
        #joystick-stick {
            position: absolute; top: 45px; left: 45px; width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.3); border-radius: 50%;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="top-row">
            <div>스테이지 <span id="stage-num" style="color:var(--primary)">1</span></div>
            <div id="timer-display">30.0</div>
            <div>Lv. <span id="lv-num" style="color:var(--accent)">1</span></div>
        </div>
        <div class="hp-bar-outer"><div id="hp-bar-inner"></div></div>
        <div class="exp-row"><div id="exp-bar-inner"></div></div>
    </div>

    <div id="boss-ui">
        <div id="boss-name" style="margin-bottom: 5px; font-weight: bold; color: #ff4757; text-shadow: 0 0 5px #000;">보스 이름</div>
        <div id="boss-hp-outer"><div id="boss-hp-inner"></div></div>
    </div>

    <div id="modal">
        <h2 id="modal-title" style="color: var(--accent); margin-top:0;">능력 선택</h2>
        <p id="modal-desc">정답입니다!</p>
        <div id="modal-options"></div>
    </div>

    <!-- 실패 화면 -->
    <div id="fail-screen">
        <h1 style="font-size: 48px; color: var(--danger); margin-bottom: 10px;">방어 실패!</h1>
        <p id="fail-msg" style="color: #ccc; margin-bottom: 30px;">지구가 위험에 처했습니다.</p>
        <div id="fail-buttons" style="display: flex; flex-direction: column; gap: 10px;">
            <button id="boss-retry-btn" class="play-btn retry-btn" style="display: none;" onclick="retryBoss()">보스전 재도전</button>
            <button class="play-btn" onclick="location.reload()">처음부터 다시 시작</button>
        </div>
    </div>

    <!-- 스테이지 클리어 화면 -->
    <div id="clear-screen" style="display: none;">
        <h1 style="font-size: 48px; color: var(--primary); margin-bottom: 10px;">STAGE CLEAR!</h1>
        <p id="clear-status-msg" style="color: #ccc; margin-bottom: 5px;">방어 성공!</p>
        <p id="clear-heal-msg" style="color: var(--accent); margin-bottom: 30px; font-weight:bold;"></p>
        <button class="play-btn" onclick="goToNextStage()">다음 지역으로 진입</button>
    </div>

    <div id="joystick-container">
        <div id="joystick-stick"></div>
    </div>

    <div id="start-screen">
        <div style="font-size: 60px; margin-bottom: 20px;">🌍</div>
        <h1 style="font-size: 44px; margin-bottom: 5px; text-align: center;">지구 과학<br>서바이벌 EX+</h1>
        <p style="color: #888; margin-bottom: 40px; text-align: center;">워크북 내용으로 무장하고<br>지구의 심장부를 수호하세요!</p>
        <button class="play-btn" onclick="startGame()">탐험 시작</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const modal = document.getElementById('modal');
    
    function resize() {
        const w = window.innerWidth; const h = window.innerHeight; const ratio = 2/3; 
        if (w / h > ratio) { canvas.height = h; canvas.width = h * ratio; } 
        else { canvas.width = w; canvas.height = w / ratio; }
    }
    window.addEventListener('resize', resize); resize();

    // PPT 완벽 반영 퀴즈 뱅크 (50개) - 중복/교육외 삭제 완료
    const quizBank = [
        { q: "지구를 구성하는 요소들이 모여 상호작용하며 생성된 계는?", a: ["지구계", "태양계", "생태계", "우주계"], c: 0 },
        { q: "지구계 구성 요소 중 지표와 지구 내부 영역을 포함하는 것은?", a: ["지권", "기권", "수권", "외권"], c: 0 },
        { q: "지구계 구성 요소 중 바다, 강, 빙하 등이 속한 영역은?", a: ["수권", "지권", "기권", "생물권"], c: 0 },
        { q: "지구계 구성 요소 중 질소, 산소 등으로 이루어진 공기층은?", a: ["기권", "외권", "수권", "지권"], c: 0 },
        { q: "지구에 살고 있는 모든 생명체를 포함하는 영역은?", a: ["생물권", "지권", "수권", "기권"], c: 0 },
        { q: "기권 바깥의 우주 공간을 무엇이라고 하는가?", a: ["외권", "내권", "기권", "수권"], c: 0 },
        { q: "구름은 물방울이지만 대기 공간에 분포하므로 어느 권역으로 분류하나?", a: ["기권", "수권", "지권", "생물권"], c: 0 },
        { q: "구름의 생성은 어느 권역 간의 상호작용 결과인가?", a: ["기권과 수권", "지권과 수권", "외권과 생물권", "기권과 외권"], c: 0 },
        { q: "지구 내부 조사 방법 중 지진파 분석은 어느 방법에 속하는가?", a: ["간접적인 방법", "직접적인 방법", "시추법", "화산 분출물 조사"], c: 0 },
        { q: "지구 내부 조사 방법 중 땅을 직접 파서 조사하는 방법은?", a: ["시추법", "지진파 분석", "화산 분출물 조사", "운석 조사"], c: 0 },
        { q: "지구 내부 구조 중 가장 겉부분이며 두께가 가장 얇은 층은?", a: ["지각", "맨틀", "외핵", "내핵"], c: 0 },
        { q: "대륙 지각과 해양 지각 중 두께가 더 두꺼운 것은?", a: ["대륙 지각", "해양 지각", "둘 다 같다", "알 수 없다"], c: 0 },
        { q: "지각 아래에서 지구 전체 부피의 약 80%를 차지하는 층은?", a: ["맨틀", "외핵", "내핵", "지각"], c: 0 },
        { q: "지구 내부 층 중 액체 상태로 추정되는 곳은?", a: ["외핵", "내핵", "맨틀", "지각"], c: 0 },
        { q: "지구 내부 층 중 가장 깊은 곳에 있는 고체 상태의 층은?", a: ["내핵", "외핵", "맨틀", "지각"], c: 0 },
        { q: "지구 내부 구조를 양파에 비유할 때 껍질에 해당하는 부분은?", a: ["지각", "맨틀", "외핵", "내핵"], c: 0 },
        { q: "마그마나 용암이 굳어져 만들어진 암석은?", a: ["화성암", "퇴적암", "변성암", "편마암"], c: 0 },
        { q: "지표 부근에서 용암이 빨리 식어 결정의 크기가 작은 화성암은?", a: ["화산암", "심성암", "퇴적암", "변성암"], c: 0 },
        { q: "지하 깊은 곳에서 마그마가 천천히 식어 결정의 크기가 큰 화성암은?", a: ["심성암", "화산암", "퇴적암", "변성암"], c: 0 },
        { q: "화성암 중 현무암은 어느 분류에 속하는가?", a: ["화산암", "심성암", "퇴적암", "변성암"], c: 0 },
        { q: "화성암 중 화강암은 어느 분류에 속하는가?", a: ["심성암", "화산암", "퇴적암", "변성암"], c: 0 },
        { q: "현무암의 색깔은 대체로 어떠한가?", a: ["어둡다", "밝다", "투명하다", "붉다"], c: 0 },
        { q: "화강암의 색깔은 대체로 어떠한가?", a: ["밝다", "어둡다", "투명하다", "검다"], c: 0 },
        { q: "화산 가스가 빠져나간 구멍이 많이 보이는 암석은?", a: ["현무암", "화강암", "역암", "대리암"], c: 0 },
        { q: "퇴적물이 쌓인 후 다져지고 굳어져 만들어진 암석은?", a: ["퇴적암", "화성암", "변성암", "화산암"], c: 0 },
        { q: "퇴적암에서 나타나는 평행한 줄무늬를 무엇이라 하는가?", a: ["층리", "엽리", "단층", "절리"], c: 0 },
        { q: "퇴적암에서 과거 생물의 유해나 흔적이 남은 것을 무엇이라 하나?", a: ["화석", "엽리", "결정", "마그마"], c: 0 },
        { q: "자갈, 모래, 진흙이 섞여 만들어진 퇴적암 중 알갱이가 가장 큰 것은?", a: ["역암", "사암", "셰일", "석회암"], c: 0 },
        { q: "주로 모래가 쌓여 만들어진 퇴적암은?", a: ["사암", "역암", "셰일", "석회암"], c: 0 },
        { q: "주로 진흙이 쌓여 만들어진 퇴적암은?", a: ["셰일", "사암", "역암", "응회암"], c: 0 },
        { q: "묽은 염산을 떨어뜨리면 거품이 발생하는 퇴적암은?", a: ["석회암", "사암", "셰일", "현무암"], c: 0 },
        { q: "석회암의 염산 반응 시 발생하는 기체는?", a: ["이산화 탄소", "산소", "수소", "질소"], c: 0 },
        { q: "암석이 높은 열과 압력을 받아 성질이 변한 암석은?", a: ["변성암", "퇴적암", "화성암", "심성암"], c: 0 },
        { q: "변성암에서 압력의 수직 방향으로 광물이 나열되어 생긴 줄무늬는?", a: ["엽리", "층리", "단층", "습곡"], c: 0 },
        { q: "석회암이 변성 작용을 받아 만들어진 암석은?", a: ["대리암", "편마암", "규암", "화강암"], c: 0 },
        { q: "사암이 변성 작용을 받아 만들어진 암석은?", a: ["규암", "대리암", "편마암", "역암"], c: 0 },
        { q: "셰일이 변성 작용을 받아 줄무늬가 굵고 결정이 커진 암석은?", a: ["편마암", "대리암", "규암", "화산암"], c: 0 },
        { q: "대리암에 묽은 염산을 떨어뜨리면 거품이 발생하는가?", a: ["네, 발생한다", "아니요, 안 난다", "색만 변한다", "녹아버린다"], c: 0 },
        { q: "대리암의 변성 작용 시 화학 성분이 완전히 바뀌는가?", a: ["아니요, 배열과 크기만 바뀐다", "네, 완전히 바뀐다", "액체로 녹는다", "알 수 없다"], c: 0 },
        { q: "변성암의 엽리는 압력의 어느 방향으로 생기는가?", a: ["수직 방향", "수평 방향", "같은 방향", "랜덤 방향"], c: 0 },
        { q: "암석이 끊임없이 다른 암석으로 변하는 과정을 무엇이라 하나?", a: ["암석의 순환", "풍화 작용", "지각 변동", "화산 활동"], c: 0 },
        { q: "암석이 마그마로 변하려면 어떤 과정이 필요한가?", a: ["녹음(용융)", "풍화", "냉각", "다져짐"], c: 0 },
        { q: "퇴적물이 퇴적암이 되는 과정은?", a: ["다져지고 굳어짐", "높은 열과 압력", "냉각", "녹음"], c: 0 },
        { q: "암석이 물과 공기에 의해 잘게 부서지거나 성분이 변하는 현상은?", a: ["풍화", "침식", "운반", "퇴적"], c: 0 },
        { q: "식물 뿌리가 암석 틈을 파고들어 암석을 부수는 것은?", a: ["풍화 작용", "침식 작용", "광합성", "증산 작용"], c: 0 },
        { q: "토양의 단면 중 유기물이 많아 식물이 자라기에 가장 적합한 층은?", a: ["표토", "심토", "모질물", "기반암"], c: 0 },
        { q: "표토에서 녹아내린 물질이 쌓여 만들어진 토양 층은?", a: ["심토", "표토", "모질물", "기반암"], c: 0 },
        { q: "토양의 생성 순서 중 가장 먼저 존재하는 층은?", a: ["기반암", "모질물", "표토", "심토"], c: 0 }
    ];

    const abilities = [
        { name: "🏹 멀티샷 (연속 발사)", type: "burst" },
        { name: "✨ 화살 +1 (확산 발사)", type: "spread" },
        { name: "⚡ 전광석화 (공속 UP)", type: "speed" },
        { name: "🔥 응축 에너지 (데미지 UP)", type: "dmg" },
        { name: "❤️ 생명력 강화 (최대 HP)", type: "hp" }
    ];

    let state = {
        active: false, paused: false, stage: 1, lv: 1, exp: 0, maxExp: 100,
        timer: 30, frameCount: 0, bossStage1: 10, bossStage2: 20, isClearTransition: false
    };

    const player = {
        x: canvas.width/2, y: canvas.height/2, radius: 22, speed: 4.8,
        hp: 100, maxHp: 100, attackCooldown: 0,
        attackSpeed: 35, dmg: 25, burstCount: 1, spreadCount: 1, lastHitTime: 0,
        invincibleTimer: 0, isMoving: false
    };

    let enemies = []; let bullets = []; let enemyBullets = []; let boss = null;
    let magicZones = []; 
    let quizPool = [];
    const input = { x: 0, y: 0, active: false }; const keys = {};

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    const jStick = document.getElementById('joystick-stick');
    const jContainer = document.getElementById('joystick-container');
    if ('ontouchstart' in window) {
        jContainer.style.display = 'block';
        jContainer.addEventListener('touchstart', () => { if(!state.paused) input.active = true; });
        jContainer.addEventListener('touchmove', e => {
            const touch = e.touches[0]; const rect = jContainer.getBoundingClientRect();
            const dx = touch.clientX - (rect.left + rect.width/2);
            const dy = touch.clientY - (rect.top + rect.height/2);
            const dist = Math.min(50, Math.sqrt(dx*dx + dy*dy)); const angle = Math.atan2(dy, dx);
            input.x = Math.cos(angle) * (dist/50); input.y = Math.sin(angle) * (dist/50);
            jStick.style.transform = `translate(${input.x*40}px, ${input.y*40}px)`;
        });
        jContainer.addEventListener('touchend', () => { input.active = false; input.x = 0; input.y = 0; jStick.style.transform = `translate(0, 0)`; });
    }

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('fail-screen').style.display = 'none';
        state.active = true; state.stage = 1; state.timer = 30; state.lv = 1; state.exp = 0; state.maxExp = 100;
        player.hp = 100; player.maxHp = 100; player.dmg = 25; player.attackSpeed = 35; player.burstCount = 1; player.spreadCount = 1;
        player.invincibleTimer = 0;
        enemies = []; bullets = []; enemyBullets = []; boss = null; magicZones = [];
        quizPool = quizBank.map((_, i) => i);
        updateUI(); animate();
    }

    function retryBoss() {
        document.getElementById('fail-screen').style.display = 'none';
        state.active = true;
        state.timer = 30; // 보스전은 타이머 무의미하지만 초기화
        player.hp = player.maxHp;
        enemies = []; bullets = []; enemyBullets = []; magicZones = [];
        spawnBoss();
        updateUI();
        // 애니메이션 루프는 이미 실행 중이거나 재실행 필요 없음 (state.active가 트리거)
    }

    function spawnEnemy() {
        if (state.stage === state.bossStage1 || state.stage === state.bossStage2 || state.isClearTransition) return;
        
        const maxEnemies = 12 + (state.stage * 3);
        if (enemies.length >= maxEnemies) return;

        const edge = Math.floor(Math.random() * 4); let x, y;
        if (edge === 0) { x = Math.random() * canvas.width; y = -50; }
        else if (edge === 1) { x = canvas.width + 50; y = Math.random() * canvas.height; }
        else if (edge === 2) { x = Math.random() * canvas.width; y = canvas.height + 50; }
        else { x = -50; y = Math.random() * canvas.height; }

        let type = 'normal';
        const rand = Math.random();
        if (state.stage >= 16 && rand > 0.85) type = 'shield'; // 16스테이지 방패병
        else if (state.stage >= 11 && rand > 0.7) type = 'mage'; // 11스테이지 마법사
        else if (state.stage >= 5 && rand > 0.75) type = 'shooter';
        else if (state.stage >= 2 && rand > 0.85) type = 'fast';

        const baseHp = state.stage === 1 ? 75 : 75 + (state.stage * 15) + (Math.pow(state.stage, 1.7) * 4);
        const baseSpeed = Math.min(4.4, (1.2 + Math.random() * 1.0) + (state.stage * 0.15));

        enemies.push({
            x, y, 
            hp: type === 'shield' ? baseHp * 5 : (type === 'fast' ? baseHp * 0.5 : (type === 'shooter' ? baseHp * 0.45 : baseHp)), 
            maxHp: type === 'shield' ? baseHp * 5 : (type === 'fast' ? baseHp * 0.5 : (type === 'shooter' ? baseHp * 0.45 : baseHp)),
            radius: type === 'shield' ? 32 : (type === 'shooter' ? 26 : (type === 'fast' ? 16 : 22)),
            speed: type === 'shield' ? baseSpeed * 0.4 : (type === 'fast' ? baseSpeed * 1.6 : (type === 'shooter' ? baseSpeed * 0.7 : baseSpeed)),
            color: type === 'shield' ? '#7f8c8d' : (type === 'mage' ? '#9b59b6' : (type === 'fast' ? '#e67e22' : '#c0392b')),
            type, blink: 0, shootCooldown: Math.random() * 60, chargeTimer: 0
        });
    }

    function spawnBoss() {
        if (state.stage === state.bossStage1) {
            const bossHp = 150000 + (state.lv * 20000);
            boss = { x: canvas.width / 2, y: -100, targetY: 150, radius: 75, hp: bossHp, maxHp: bossHp, color: '#ff4757', attackCooldown: 0, blink: 0, moveDir: 1, moveTimer: 0, pattern: 0 };
            document.getElementById('boss-name').innerText = "지구의 핵 - 진동하는 파괴자";
        } else if (state.stage === state.bossStage2) {
            const bossHp = 500000 + (state.lv * 50000); // 20스테이지 최종보스 체력 대폭 상향
            boss = { x: canvas.width / 2, y: -100, targetY: 150, radius: 90, hp: bossHp, maxHp: bossHp, color: '#2c3e50', attackCooldown: 0, blink: 0, moveDir: 1, moveTimer: 0, pattern: 0 };
            document.getElementById('boss-name').innerText = "지구의 심장 - 최종 심판자";
        }
        document.getElementById('boss-ui').style.display = 'flex';
        document.getElementById('timer-display').style.display = 'none';
    }

    function showStageClear() {
        state.isClearTransition = true;
        enemies = []; bullets = []; enemyBullets = []; magicZones = [];
        document.getElementById('clear-screen').style.display = 'flex';
        const healAmt = player.maxHp * 0.2;
        player.hp = Math.min(player.maxHp, player.hp + healAmt);
        document.getElementById('clear-heal-msg').innerText = `✨ 탐험 성과 보너스: 체력 20% 회복! (+${Math.round(healAmt)})`;
    }

    function goToNextStage() {
        document.getElementById('clear-screen').style.display = 'none';
        openQuiz(false); 
    }

    function proceedAfterQuiz() {
        state.isClearTransition = false;
        state.stage++; state.timer = 30;
        if (state.stage === state.bossStage1 || state.stage === state.bossStage2) spawnBoss();
        else {
            document.getElementById('boss-ui').style.display = 'none';
            document.getElementById('timer-display').style.display = 'block';
        }
        player.invincibleTimer = 30; 
        updateUI();
    }

    function drawPlayer() {
        ctx.save(); ctx.translate(player.x, player.y);
        const isHit = Date.now() - player.lastHitTime < 100;
        const isInvincible = player.invincibleTimer > 0 && Math.floor(state.frameCount / 2) % 2 === 0;
        ctx.fillStyle = isHit ? '#ff0000' : (isInvincible ? 'rgba(241, 196, 15, 0.5)' : '#f1c40f'); 
        ctx.beginPath(); ctx.arc(0, 0, player.radius, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        if (player.isMoving) { ctx.fillRect(-10, -5, 4, 10); ctx.fillRect(6, -5, 4, 10); } 
        else { ctx.beginPath(); ctx.arc(-8, -4, 3, 0, Math.PI*2); ctx.arc(8, -4, 3, 0, Math.PI*2); ctx.fill(); }
        ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.beginPath();
        if (player.hp < 30) ctx.arc(0, 12, 5, Math.PI, 0); else ctx.arc(0, 5, 6, 0.2, Math.PI - 0.2); ctx.stroke();
        ctx.restore();
    }

    function drawEnemy(en) {
        ctx.save(); ctx.translate(en.x, en.y);
        ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(0, en.radius + 5, en.radius * 0.8, 5, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = en.blink > 0 ? '#fff' : en.color; 
        
        if (en.type === 'fast') { 
            ctx.beginPath(); ctx.moveTo(0, -en.radius); ctx.lineTo(en.radius, en.radius); ctx.lineTo(-en.radius, en.radius); ctx.fill();
        } else if (en.type === 'shooter' || en.type === 'mage') {
            ctx.beginPath(); 
            for(let i=0; i<6; i++) { const ang = (Math.PI*2/6)*i; ctx.lineTo(Math.cos(ang)*en.radius, Math.sin(ang)*en.radius); }
            ctx.fill();
            if (en.type === 'mage') { // 마법사 모자
                ctx.fillStyle = '#2c3e50';
                ctx.beginPath(); ctx.moveTo(-en.radius, -en.radius/2); ctx.lineTo(0, -en.radius*1.8); ctx.lineTo(en.radius, -en.radius/2); ctx.fill();
            }
        } else if (en.type === 'shield') {
            ctx.fillRect(-en.radius, -en.radius, en.radius*2, en.radius*2);
            ctx.fillStyle = '#34495e';
            ctx.fillRect(-en.radius + 5, -en.radius + 5, 10, en.radius*2 - 10); // 방패 느낌
        } else {
            ctx.beginPath(); ctx.arc(0, 0, en.radius, 0, Math.PI*2); ctx.fill();
        }

        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-6, -4, 4, 0, Math.PI*2); ctx.arc(6, -4, 4, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-6, -4, 2, 0, Math.PI*2); ctx.arc(6, -4, 2, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.beginPath();
        ctx.moveTo(-10, -10); ctx.lineTo(-2, -6); ctx.moveTo(10, -10); ctx.lineTo(2, -6); ctx.stroke();
        ctx.restore(); if (en.blink > 0) en.blink--;
    }

    function drawBoss() {
        if (!boss) return;
        ctx.save(); ctx.translate(boss.x, boss.y);
        ctx.fillStyle = boss.blink > 0 ? '#fff' : boss.color; ctx.shadowBlur = 30; ctx.shadowColor = boss.color;
        ctx.beginPath(); ctx.arc(0, 0, boss.radius, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.ellipse(-25, -15, 15, 22, 0, 0, Math.PI*2); ctx.ellipse(25, -15, 15, 22, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-25, -10, 8, 0, Math.PI*2); ctx.arc(25, -10, 8, 0, Math.PI*2); ctx.fill();
        ctx.restore(); if (boss.blink > 0) boss.blink--;
    }

    function openQuiz(isLevelUp = true) {
        state.paused = true; input.active = false;
        if (quizPool.length === 0) quizPool = quizBank.map((_, i) => i);
        const poolIndex = Math.floor(Math.random() * quizPool.length);
        const quizIndex = quizPool.splice(poolIndex, 1)[0];
        const quiz = quizBank[quizIndex];
        document.getElementById('modal-title').innerText = isLevelUp ? "레벨업! 지식 강화" : `스테이지 ${state.stage} 클리어 퀴즈`;
        document.getElementById('modal-desc').innerText = quiz.q;
        const opts = document.getElementById('modal-options'); opts.innerHTML = '';
        quiz.a.forEach((txt, i) => {
            const btn = document.createElement('button'); btn.className = 'option-btn'; btn.innerText = txt;
            btn.onclick = () => { if (i === quiz.c) openAbilitySelection(isLevelUp); else handlePenalty(isLevelUp); };
            opts.appendChild(btn);
        });
        modal.style.display = 'block';
    }

    function handlePenalty(isLevelUp) {
        modal.style.display = 'none'; state.paused = false;
        player.hp -= 25; player.invincibleTimer = 30;
        updateUI(); if (player.hp <= 0) endGame(); if (!isLevelUp) proceedAfterQuiz(); 
    }

    function openAbilitySelection(isLevelUp) {
        document.getElementById('modal-title').innerText = "능력 선택"; document.getElementById('modal-desc').innerText = "정답입니다! 강화를 선택하세요.";
        const opts = document.getElementById('modal-options'); opts.innerHTML = '';
        const shuffled = abilities.sort(() => 0.5 - Math.random()).slice(0, 3);
        shuffled.forEach(ab => {
            const btn = document.createElement('button'); btn.className = 'option-btn'; btn.innerText = ab.name;
            btn.onclick = () => {
                if (ab.type === 'burst') player.burstCount++;
                if (ab.type === 'spread') player.spreadCount++;
                if (ab.type === 'speed') player.attackSpeed = Math.max(6, player.attackSpeed - 5);
                if (ab.type === 'dmg') player.dmg += 20;
                if (ab.type === 'hp') { player.maxHp += 50; player.hp = player.maxHp; }
                modal.style.display = 'none'; state.paused = false; player.invincibleTimer = 30;
                updateUI(); if (!isLevelUp) proceedAfterQuiz();
            };
            opts.appendChild(btn);
        });
    }

    function updateUI() {
        document.getElementById('stage-num').innerText = state.stage; document.getElementById('lv-num').innerText = state.lv;
        document.getElementById('timer-display').innerText = Math.max(0, state.timer).toFixed(1);
        document.getElementById('hp-bar-inner').style.width = (player.hp / player.maxHp * 100) + '%';
        document.getElementById('exp-bar-inner').style.width = (state.exp / state.maxExp * 100) + '%';
        if (boss) document.getElementById('boss-hp-inner').style.width = (boss.hp / boss.maxHp * 100) + '%';
    }

    function endGame(win = false) {
        state.active = false;
        if (win) {
            alert(`지구 수호 성공! 모든 위협으로부터 지구를 구했습니다! 최종 레벨: ${state.lv}`);
            location.reload();
        } else {
            document.getElementById('fail-screen').style.display = 'flex';
            const retryBtn = document.getElementById('boss-retry-btn');
            if (state.stage === state.bossStage1 || state.stage === state.bossStage2) {
                retryBtn.style.display = 'block';
                document.getElementById('fail-msg').innerText = `보스전에서 패배했습니다. 다시 도전하시겠습니까?`;
            } else {
                retryBtn.style.display = 'none';
                document.getElementById('fail-msg').innerText = `스테이지 ${state.stage}에서 패배했습니다.`;
            }
        }
    }

    function fireBullets() {
        let target = null;
        if (boss) target = boss;
        else if (enemies.length > 0) {
            let minDist = Infinity;
            enemies.forEach(e => { const d = Math.sqrt((e.x-player.x)**2 + (e.y-player.y)**2); if (d < minDist) { minDist = d; target = e; } });
        }
        if (!target) return;
        const baseAngle = Math.atan2(target.y - player.y, target.x - player.x);
        for (let b = 0; b < player.burstCount; b++) {
            setTimeout(() => {
                if (!state.active || state.paused) return;
                for (let s = 0; s < player.spreadCount; s++) {
                    const offset = (s - (player.spreadCount - 1) / 2) * 0.22;
                    bullets.push({ x: player.x, y: player.y, vx: Math.cos(baseAngle + offset) * 10, vy: Math.sin(baseAngle + offset) * 10, dmg: player.dmg });
                }
            }, b * 120);
        }
    }

    function animate() {
        if (!state.active) return;
        if (state.paused || state.isClearTransition) { requestAnimationFrame(animate); return; }
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (player.invincibleTimer > 0) player.invincibleTimer--;

        if (state.stage < state.bossStage2) { 
            state.timer -= 1/60; 
            if (state.timer <= 0 && state.stage !== state.bossStage1) showStageClear(); 
        }

        let mx = 0, my = 0;
        if (keys['KeyW'] || keys['ArrowUp']) my = -1; if (keys['KeyS'] || keys['ArrowDown']) my = 1;
        if (keys['KeyA'] || keys['ArrowLeft']) mx = -1; if (keys['KeyD'] || keys['ArrowRight']) mx = 1;
        if (input.active) { mx = input.x; my = input.y; }
        if (mx !== 0 || my !== 0) {
            player.x += mx * player.speed; player.y += my * player.speed; player.isMoving = true;
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
        } else { player.isMoving = false; }
        drawPlayer();

        // 마법사 공격 영역 그리기
        magicZones.forEach((mz, idx) => {
            ctx.beginPath();
            ctx.arc(mz.x, mz.y, mz.radius, 0, Math.PI*2);
            ctx.fillStyle = mz.timer > 20 ? `rgba(231, 76, 60, ${0.1 + (60-mz.timer)/60})` : 'rgba(231, 76, 60, 0.8)';
            ctx.fill();
            mz.timer--;
            if (mz.timer === 0) {
                const d = Math.sqrt((player.x-mz.x)**2 + (player.y-mz.y)**2);
                if (d < player.radius + mz.radius && player.invincibleTimer <= 0) {
                    player.hp -= 25; player.lastHitTime = Date.now();
                    if (player.hp <= 0) endGame();
                }
                magicZones.splice(idx, 1);
            }
        });

        if (state.stage !== state.bossStage1 && state.stage !== state.bossStage2) {
            if (state.frameCount % (Math.max(10, 42 - state.stage * 2)) === 0) spawnEnemy();
            enemies.forEach((en, idx) => {
                const dx = player.x - en.x; const dy = player.y - en.y; const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (en.type === 'shooter' && dist < 220) { en.x -= (dx/dist) * en.speed; en.y -= (dy/dist) * en.speed; } 
                else if (en.type === 'mage' && dist < 250) { en.x -= (dx/dist) * en.speed; en.y -= (dy/dist) * en.speed; }
                else { en.x += (dx/dist) * en.speed; en.y += (dy/dist) * en.speed; }
                
                drawEnemy(en);

                if (en.type === 'shooter') {
                    en.shootCooldown++;
                    if (en.shootCooldown > Math.max(50, 140 - state.stage * 10)) {
                        const ang = Math.atan2(dy, dx);
                        enemyBullets.push({ x: en.x, y: en.y, vx: Math.cos(ang)*5.5, vy: Math.sin(ang)*5.5, radius: 7, bounces: 0 });
                        en.shootCooldown = 0;
                    }
                } else if (en.type === 'mage') {
                    en.shootCooldown++;
                    if (en.shootCooldown > 120) {
                        magicZones.push({ x: player.x, y: player.y, radius: 80, timer: 60 });
                        en.shootCooldown = 0;
                    }
                }

                if (dist < player.radius + en.radius && player.invincibleTimer <= 0) {
                    player.hp -= (en.type === 'shield' ? 2.0 : 1.0); 
                    player.lastHitTime = Date.now();
                    if (player.hp <= 0) endGame();
                }
            });
        } else if (boss) {
            if (boss.y < boss.targetY) boss.y += 2;
            else {
                boss.moveTimer += 0.02;
                boss.x = canvas.width / 2 + Math.sin(boss.moveTimer) * (canvas.width * 0.3);
                boss.attackCooldown++;

                if (boss.attackCooldown % (state.stage === 20 ? 120 : 180) === 0) { boss.pattern = Math.floor(Math.random() * (state.stage === 20 ? 4 : 3)); }

                if (boss.attackCooldown % (state.stage === 20 ? 30 : 40) === 0) {
                    if (boss.pattern === 0) { // 원형 발사
                        const count = state.stage === 20 ? 24 : 18;
                        for(let i=0; i<count; i++) {
                            const ang = (Math.PI*2/count)*i + (state.frameCount*0.05);
                            enemyBullets.push({ x: boss.x, y: boss.y, vx: Math.cos(ang)*7, vy: Math.sin(ang)*7, radius: 9, bounces: 0 });
                        }
                    } else if (boss.pattern === 1) { // 튕기는 탄환
                        const count = state.stage === 20 ? 12 : 8;
                        for(let i=0; i<count; i++) {
                            const ang = (Math.PI*2/count)*i;
                            enemyBullets.push({ x: boss.x, y: boss.y, vx: Math.cos(ang)*6, vy: Math.sin(ang)*6, radius: 10, bounces: (state.stage === 20 ? 4 : 2) });
                        }
                    } else if (boss.pattern === 2) { // 조준 점사
                        const ang = Math.atan2(player.y-boss.y, player.x-boss.x);
                        const count = state.stage === 20 ? 5 : 3;
                        for(let i=0; i<count; i++) {
                            setTimeout(() => { if(boss) enemyBullets.push({ x: boss.x, y: boss.y, vx: Math.cos(ang)*10, vy: Math.sin(ang)*10, radius: 12, bounces: 0 }); }, i * 120);
                        }
                    } else if (boss.pattern === 3) { // 20스테이지 전용: 나선형 마법 폭발
                        magicZones.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, radius: 100, timer: 45 });
                        const ang = Math.atan2(player.y-boss.y, player.x-boss.x);
                        enemyBullets.push({ x: boss.x, y: boss.y, vx: Math.cos(ang)*12, vy: Math.sin(ang)*12, radius: 15, bounces: 1 });
                    }
                }
            }
            drawBoss();
        }

        // 적 탄환 업데이트
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
            const eb = enemyBullets[i];
            eb.x += eb.vx; eb.y += eb.vy;

            if (eb.bounces > 0) {
                if (eb.x < 0 || eb.x > canvas.width) { eb.vx *= -1; eb.bounces--; }
                if (eb.y < 0 || eb.y > canvas.height) { eb.vy *= -1; eb.bounces--; }
            }

            ctx.fillStyle = eb.bounces > 0 ? '#ffeb3b' : '#ff4757';
            ctx.beginPath(); ctx.arc(eb.x, eb.y, eb.radius, 0, Math.PI*2); ctx.fill();
            if (eb.bounces > 0) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke(); }

            const d = Math.sqrt((eb.x-player.x)**2 + (eb.y-player.y)**2);
            if (d < player.radius + eb.radius) {
                if (player.invincibleTimer <= 0) {
                    player.hp -= (eb.bounces > 0 ? 15 : 20); 
                    player.lastHitTime = Date.now();
                    enemyBullets.splice(i, 1);
                    if (player.hp <= 0) endGame();
                }
                continue;
            }
            if (eb.x < -100 || eb.x > canvas.width+100 || eb.y < -100 || eb.y > canvas.height+100) enemyBullets.splice(i, 1);
        }

        player.attackCooldown++;
        if (player.attackCooldown >= player.attackSpeed) { fireBullets(); player.attackCooldown = 0; }

        bullets.forEach((b, idx) => {
            b.x += b.vx; b.y += b.vy; ctx.fillStyle = '#3498db'; ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, Math.PI*2); ctx.fill();
            if (boss && Math.sqrt((b.x-boss.x)**2 + (b.y-boss.y)**2) < boss.radius+6) {
                boss.hp -= b.dmg; boss.blink = 3; bullets.splice(idx, 1);
                if (boss.hp <= 0) {
                    if (state.stage === state.bossStage2) endGame(true);
                    else showStageClear();
                }
            }
            enemies.forEach((en, eIdx) => {
                if (Math.sqrt((b.x-en.x)**2 + (b.y-en.y)**2) < en.radius+6) {
                    en.hp -= b.dmg; en.blink = 3; bullets.splice(idx, 1);
                    if (en.hp <= 0) {
                        enemies.splice(eIdx, 1); state.exp += 35;
                        if (state.exp >= state.maxExp) { state.lv++; state.exp = 0; state.maxExp = 150 + (state.lv * 100) + (Math.pow(state.lv, 1.8) * 20); openQuiz(true); }
                    }
                }
            });
            if (b.x < -20 || b.x > canvas.width+20 || b.y < -20 || b.y > canvas.height+20) bullets.splice(idx, 1);
        });

        state.frameCount++; updateUI(); requestAnimationFrame(animate);
    }
</script>
